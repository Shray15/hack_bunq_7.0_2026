name: Deploy (staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

# One staging deploy at a time per branch; never shares a concurrency group with production.
concurrency:
  group: staging-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Compute tags and image name
        id: tags
        run: |
          set -euo pipefail
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]-')
          SHA_SHORT="${GITHUB_SHA:0:7}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="${REGISTRY}/${REPO_LOWER}"
          {
            echo "image_repo=${IMAGE_REPO}"
            echo "branch_tag=${BRANCH_TAG}"
            echo "sha_short=${SHA_SHORT}"
            echo "version=${BRANCH_TAG}-${SHA_SHORT}"
            echo "full_image=${IMAGE_REPO}:${BRANCH_TAG}-${SHA_SHORT}"
            echo "mcp_image_repo=${IMAGE_REPO}-grocery-mcp"
            echo "mcp_full_image=${IMAGE_REPO}-grocery-mcp:${BRANCH_TAG}-${SHA_SHORT}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.full_image }}
          build-args: |
            VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha,scope=staging-backend
          cache-to: type=gha,mode=max,scope=staging-backend

      - name: Build and push grocery-mcp image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          file: ./mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.mcp_image_repo }}:${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.mcp_full_image }}
          cache-from: type=gha,scope=staging-mcp
          cache-to: type=gha,mode=max,scope=staging-mcp

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Stage .env file
        env:
          IMAGE: ${{ steps.tags.outputs.full_image }}
          GROCERY_MCP_IMAGE: ${{ steps.tags.outputs.mcp_full_image }}
          VERSION: ${{ steps.tags.outputs.version }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AGENTCORE_MEMORY_ROLE_ARN: ${{ secrets.AGENTCORE_MEMORY_ROLE_ARN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUNQ_API_KEY: ${{ secrets.BUNQ_API_KEY }}
          PICNIC_AUTH_TOKEN: ${{ secrets.PICNIC_AUTH_TOKEN }}
          PICNIC_EMAIL: ${{ secrets.PICNIC_EMAIL }}
          PICNIC_PASSWORD: ${{ secrets.PICNIC_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          {
            echo "IMAGE=${IMAGE}"
            echo "GROCERY_MCP_IMAGE=${GROCERY_MCP_IMAGE}"
            echo "VERSION=${VERSION}"
            echo "ENVIRONMENT=staging"
            echo "POSTGRES_USER=cooking"
            echo "POSTGRES_DB=cooking"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "GROCERY_MCP_URL=http://grocery-mcp:8001/mcp"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}"
            echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}"
            echo "AWS_REGION=${AWS_REGION:-us-east-1}"
            echo "AGENTCORE_MEMORY_ROLE_ARN=${AGENTCORE_MEMORY_ROLE_ARN}"
            echo "AWS_BEDROCK_MODEL_ID=us.anthropic.claude-sonnet-4-5-20250929-v1:0"
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
            echo "BUNQ_API_KEY=${BUNQ_API_KEY}"
            echo "PICNIC_AUTH_TOKEN=${PICNIC_AUTH_TOKEN}"
            echo "PICNIC_EMAIL=${PICNIC_EMAIL}"
            echo "PICNIC_PASSWORD=${PICNIC_PASSWORD}"
          } > .env.staging

      - name: Sync compose + .env to EC2 staging directory
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          # /opt/app-staging is intentionally separate from /opt/app (production)
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" "mkdir -p /opt/app-staging"
          scp -i ~/.ssh/deploy_key deploy/docker-compose.staging.yml "${EC2_USER}@${EC2_HOST}:/opt/app-staging/docker-compose.yml"
          scp -i ~/.ssh/deploy_key .env.staging "${EC2_USER}@${EC2_HOST}:/opt/app-staging/.env"

      - name: Stage remote deploy script
        run: |
          set -euo pipefail
          cat > deploy-staging.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          cd /opt/app-staging
          chmod 600 .env
          echo "${GHCR_PASS}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          docker logout ghcr.io >/dev/null 2>&1 || true
          SCRIPT
          chmod +x deploy-staging.sh

      - name: Run deploy on EC2 (staging only)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key deploy-staging.sh "${EC2_USER}@${EC2_HOST}:/tmp/deploy-staging.sh"
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" \
            "GHCR_USER='${GHCR_USER}' GHCR_PASS='${GHCR_PASS}' bash /tmp/deploy-staging.sh && rm -f /tmp/deploy-staging.sh"

      - name: Verify staging deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EXPECTED_VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            sleep 5
            RESP=$(curl -fsS "http://${EC2_HOST}:4568/healthz" 2>/dev/null || true)
            echo "Attempt $i: ${RESP}"
            if echo "${RESP}" | grep -q "${EXPECTED_VERSION}"; then
              echo "Staging deploy verified: ${EXPECTED_VERSION} is live at http://${EC2_HOST}:4568/healthz"
              exit 0
            fi
          done
          echo "Staging deploy did not surface ${EXPECTED_VERSION} within ~90s."
          exit 1
