name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Compute tags and image name
        id: tags
        run: |
          set -euo pipefail
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]-')
          SHA_SHORT="${GITHUB_SHA:0:7}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="${REGISTRY}/${REPO_LOWER}"
          {
            echo "image_repo=${IMAGE_REPO}"
            echo "branch_tag=${BRANCH_TAG}"
            echo "sha_short=${SHA_SHORT}"
            echo "version=${BRANCH_TAG}-${SHA_SHORT}"
            echo "full_image=${IMAGE_REPO}:${BRANCH_TAG}-${SHA_SHORT}"
            echo "mcp_image_repo=${IMAGE_REPO}-grocery-mcp"
            echo "mcp_full_image=${IMAGE_REPO}-grocery-mcp:${BRANCH_TAG}-${SHA_SHORT}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.full_image }}
          build-args: |
            VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push grocery-mcp image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          file: ./mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.mcp_image_repo }}:${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.mcp_full_image }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Stage .env file
        env:
          IMAGE: ${{ steps.tags.outputs.full_image }}
          GROCERY_MCP_IMAGE: ${{ steps.tags.outputs.mcp_full_image }}
          VERSION: ${{ steps.tags.outputs.version }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUNQ_API_KEY: ${{ secrets.BUNQ_API_KEY }}
          PICNIC_AUTH_TOKEN: ${{ secrets.PICNIC_AUTH_TOKEN }}
          PICNIC_EMAIL: ${{ secrets.PICNIC_EMAIL }}
          PICNIC_PASSWORD: ${{ secrets.PICNIC_PASSWORD }}
          BUNQ_ME_USERNAME: ${{ secrets.BUNQ_ME_USERNAME }}
        run: |
          set -euo pipefail
          umask 077
          {
            echo "IMAGE=${IMAGE}"
            echo "GROCERY_MCP_IMAGE=${GROCERY_MCP_IMAGE}"
            echo "VERSION=${VERSION}"
            echo "ENVIRONMENT=production"
            echo "POSTGRES_USER=cooking"
            echo "POSTGRES_DB=cooking"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "GROCERY_MCP_URL=http://grocery-mcp:8001/mcp"
            echo "DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}"
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
            echo "BUNQ_API_KEY=${BUNQ_API_KEY}"
            echo "PICNIC_AUTH_TOKEN=${PICNIC_AUTH_TOKEN}"
            echo "PICNIC_EMAIL=${PICNIC_EMAIL}"
            echo "PICNIC_PASSWORD=${PICNIC_PASSWORD}"
            echo "BUNQ_ME_USERNAME=${BUNQ_ME_USERNAME}"
          } > .env.deploy

      - name: Sync compose + .env to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key deploy/docker-compose.yml "${EC2_USER}@${EC2_HOST}:/opt/app/docker-compose.yml"
          scp -i ~/.ssh/deploy_key .env.deploy "${EC2_USER}@${EC2_HOST}:/opt/app/.env"

      - name: Stage remote deploy script
        run: |
          set -euo pipefail
          cat > deploy.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          cd /opt/app
          chmod 600 .env
          echo "${GHCR_PASS}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          docker logout ghcr.io >/dev/null 2>&1 || true
          SCRIPT
          chmod +x deploy.sh

      - name: Run deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key deploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/deploy.sh"
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" \
            "GHCR_USER='${GHCR_USER}' GHCR_PASS='${GHCR_PASS}' bash /tmp/deploy.sh && rm -f /tmp/deploy.sh"

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EXPECTED_VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            sleep 5
            RESP=$(curl -fsS "http://${EC2_HOST}:4567/healthz" 2>/dev/null || true)
            echo "Attempt $i: ${RESP}"
            if echo "${RESP}" | grep -q "${EXPECTED_VERSION}"; then
              echo "Deploy verified: ${EXPECTED_VERSION} is live at http://${EC2_HOST}:4567/healthz"
              exit 0
            fi
          done
          echo "Deploy did not surface ${EXPECTED_VERSION} within ~90s."
          exit 1
