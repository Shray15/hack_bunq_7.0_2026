name: CI

on:
  pull_request:
  push:
    branches-ignore: []

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cooking
          POSTGRES_PASSWORD: cooking
          POSTGRES_DB: cooking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cooking -d cooking_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cooking:cooking@localhost:5432/cooking_test
      JWT_SECRET: ci-test-secret-not-for-production
      ENVIRONMENT: test
      VERSION: ci-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check app alembic

      - name: Ruff format check
        run: uv run ruff format --check app alembic
        continue-on-error: true

      - name: Mypy
        run: uv run mypy app

      - name: Alembic upgrade head (against test postgres)
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -q
