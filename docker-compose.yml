services:

  # Person B's FastAPI backend — Person B fills this in
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - grocery-api
    environment:
      GROCERY_API_URL: http://grocery-api:8001

  # Person C — Grocery + bunq payment API
  grocery-api:
    build: ./mcp
    ports:
      - "8001:8001"
    env_file:
      - ./mcp/.env
